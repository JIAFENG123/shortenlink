<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>短链接生成器</title>
    <style>
      :root {
        color-scheme: light dark;
      }
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #0f172a;
        color: #e2e8f0;
      }
      .container {
        max-width: 720px;
        margin: 64px auto;
        padding: 24px;
      }
      .card {
        background: #111827;
        border: 1px solid #334155;
        border-radius: 12px;
        padding: 24px;
      }
      h1 {
        margin: 0 0 8px;
      }
      p {
        margin: 0 0 16px;
        color: #94a3b8;
      }
      label {
        display: block;
        margin-bottom: 8px;
        font-weight: 600;
      }
      input {
        width: 100%;
        box-sizing: border-box;
        padding: 12px;
        border-radius: 8px;
        border: 1px solid #475569;
        background: #0f172a;
        color: #e2e8f0;
      }
      button {
        margin-top: 12px;
        padding: 10px 16px;
        border: none;
        border-radius: 8px;
        background: #2563eb;
        color: #fff;
        font-size: 14px;
        cursor: pointer;
      }
      button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }
      .result {
        margin-top: 16px;
        padding: 12px;
        border-radius: 8px;
        background: #0f172a;
        border: 1px dashed #475569;
        word-break: break-all;
      }
      .error {
        margin-top: 12px;
        color: #fca5a5;
      }
      .muted {
        margin-top: 20px;
        font-size: 13px;
        color: #64748b;
      }
    </style>
  </head>
  <body>
    <main class="container">
      <section class="card">
        <h1>长链接 -> 短链接</h1>
        <p>输入完整链接（http/https），生成可直接访问的短链。</p>

        <form id="form">
          <label for="url">长链接</label>
          <input id="url" type="url" placeholder="https://example.com/path?a=1" required />
          <button id="submit" type="submit">生成短链接</button>
        </form>

        <div id="result" class="result" hidden></div>
        <div id="error" class="error" hidden></div>
        <div class="muted">部署于 Netlify，短链数据存储在 Netlify Blobs。</div>
      </section>
    </main>

    <script>
      const form = document.getElementById("form");
      const input = document.getElementById("url");
      const resultEl = document.getElementById("result");
      const errorEl = document.getElementById("error");
      const submitBtn = document.getElementById("submit");

      function setError(message) {
        errorEl.textContent = message;
        errorEl.hidden = !message;
      }

      function setResult(url) {
        if (!url) {
          resultEl.hidden = true;
          return;
        }
        resultEl.innerHTML = `短链接：<a href="${url}" target="_blank" rel="noopener noreferrer">${url}</a>`;
        resultEl.hidden = false;
      }

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        const longUrl = input.value.trim();
        setError("");
        setResult("");
        submitBtn.disabled = true;
        submitBtn.textContent = "生成中...";

        try {
          const res = await fetch("/api/shorten", {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify({ longUrl })
          });
          const data = await res.json();
          if (!res.ok) {
            throw new Error(data.error || "生成失败，请稍后重试");
          }
          setResult(data.shortUrl);
        } catch (err) {
          setError(err.message || "发生未知错误");
        } finally {
          submitBtn.disabled = false;
          submitBtn.textContent = "生成短链接";
        }
      });
    </script>
  </body>
</html>
