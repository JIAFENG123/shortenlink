<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>短链接生成器</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          "Helvetica Neue", sans-serif;
        background: #0f172a;
        color: #e2e8f0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .container {
        width: 100%;
        max-width: 520px;
        padding: 24px;
      }

      .card {
        background: #1e293b;
        border: 1px solid #334155;
        border-radius: 16px;
        padding: 32px;
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.3);
      }

      .title {
        font-size: 24px;
        font-weight: 700;
        margin-bottom: 6px;
        background: linear-gradient(135deg, #60a5fa, #a78bfa);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .subtitle {
        font-size: 14px;
        color: #94a3b8;
        margin-bottom: 24px;
        line-height: 1.5;
      }

      .form-group {
        margin-bottom: 16px;
      }

      label {
        display: block;
        font-size: 13px;
        font-weight: 600;
        color: #cbd5e1;
        margin-bottom: 6px;
      }

      label .optional {
        font-weight: 400;
        color: #64748b;
        margin-left: 4px;
      }

      .text-input {
        width: 100%;
        padding: 12px 14px;
        border-radius: 10px;
        border: 1px solid #475569;
        background: #0f172a;
        color: #e2e8f0;
        font-size: 15px;
        transition: border-color 0.2s, box-shadow 0.2s;
        outline: none;
      }

      .text-input:focus {
        border-color: #60a5fa;
        box-shadow: 0 0 0 3px rgba(96, 165, 250, 0.15);
      }

      .text-input::placeholder {
        color: #64748b;
      }

      .preview {
        margin-top: 8px;
        font-size: 13px;
        color: #64748b;
        word-break: break-all;
        min-height: 20px;
        transition: color 0.2s;
      }

      .preview.active {
        color: #a78bfa;
      }

      .btn {
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 10px;
        background: linear-gradient(135deg, #3b82f6, #6366f1);
        color: #fff;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        transition: opacity 0.2s, transform 0.1s;
      }

      .btn:hover {
        opacity: 0.9;
      }

      .btn:active {
        transform: scale(0.98);
      }

      .btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        transform: none;
      }

      .result-box {
        margin-top: 20px;
        padding: 14px 16px;
        background: #0f172a;
        border: 1px solid #334155;
        border-radius: 10px;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .result-box a {
        flex: 1;
        color: #60a5fa;
        text-decoration: none;
        word-break: break-all;
        font-size: 14px;
        font-weight: 500;
      }

      .result-box a:hover {
        text-decoration: underline;
      }

      .copy-btn {
        flex-shrink: 0;
        padding: 6px 14px;
        border: 1px solid #475569;
        border-radius: 8px;
        background: #1e293b;
        color: #cbd5e1;
        font-size: 13px;
        cursor: pointer;
        transition: background 0.2s, border-color 0.2s;
      }

      .copy-btn:hover {
        background: #334155;
        border-color: #60a5fa;
      }

      .copy-btn.copied {
        background: #065f46;
        border-color: #34d399;
        color: #a7f3d0;
      }

      .error-msg {
        margin-top: 12px;
        padding: 10px 14px;
        border-radius: 8px;
        background: rgba(239, 68, 68, 0.1);
        border: 1px solid rgba(239, 68, 68, 0.3);
        color: #fca5a5;
        font-size: 14px;
      }

      .alias-hint {
        margin-top: 6px;
        font-size: 12px;
        color: #64748b;
        line-height: 1.4;
      }

      .footer {
        margin-top: 24px;
        text-align: center;
        font-size: 12px;
        color: #475569;
      }
    </style>
  </head>
  <body>
    <main class="container">
      <div class="card">
        <h1 class="title">短链接生成器</h1>
        <p class="subtitle">
          输入完整链接，自定义专属短码或自动生成。
        </p>

        <form id="form">
          <div class="form-group">
            <label for="url">长链接</label>
            <input
              id="url"
              class="text-input"
              type="url"
              placeholder="https://example.com/very-long-path?param=value"
              required
              autocomplete="off"
            />
          </div>

          <div class="form-group">
            <label for="alias">
              自定义短码
              <span class="optional">（可选）</span>
            </label>
            <input
              id="alias"
              class="text-input"
              type="text"
              placeholder="my-blog、🚀、🎉party"
              autocomplete="off"
            />
            <div id="preview" class="preview"></div>
            <div class="alias-hint">
              留空则自动生成 · 支持字母、数字、Emoji、中文等 · 1 ~ 32 位
            </div>
          </div>

          <button class="btn" id="submit" type="submit">生成短链接</button>
        </form>

        <div id="result" hidden></div>
        <div id="error" hidden></div>
        <div class="footer">短链数据存储在 Netlify Blobs</div>
      </div>
    </main>

    <script>
      const form = document.getElementById("form");
      const urlInput = document.getElementById("url");
      const aliasInput = document.getElementById("alias");
      const previewEl = document.getElementById("preview");
      const resultEl = document.getElementById("result");
      const errorEl = document.getElementById("error");
      const submitBtn = document.getElementById("submit");

      const origin = location.origin;

      aliasInput.addEventListener("input", () => {
        const v = aliasInput.value.trim();
        if (v) {
          previewEl.textContent = `${origin}/${v}`;
          previewEl.classList.add("active");
        } else {
          previewEl.textContent = "";
          previewEl.classList.remove("active");
        }
      });

      function showError(msg) {
        errorEl.className = "error-msg";
        errorEl.textContent = msg;
        errorEl.hidden = !msg;
      }

      function showResult(url, code) {
        if (!url) {
          resultEl.hidden = true;
          return;
        }
        resultEl.className = "result-box";
        resultEl.innerHTML =
          `<a href="${url}" target="_blank" rel="noopener noreferrer">/${code}</a>` +
          `<button class="copy-btn" type="button" onclick="copyUrl(this)">复制链接</button>`;
        resultEl.hidden = false;
      }

      function copyUrl(btn) {
        const url = btn.previousElementSibling.href;
        navigator.clipboard.writeText(url).then(() => {
          btn.textContent = "已复制";
          btn.classList.add("copied");
          setTimeout(() => {
            btn.textContent = "复制";
            btn.classList.remove("copied");
          }, 2000);
        });
      }

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        const longUrl = urlInput.value.trim();
        const alias = aliasInput.value.trim();
        showError("");
        showResult("");
        submitBtn.disabled = true;
        submitBtn.textContent = "生成中…";

        try {
          const payload = { longUrl };
          if (alias) payload.alias = alias;

          const res = await fetch("/api/shorten", {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify(payload),
          });
          const data = await res.json();
          if (!res.ok) {
            throw new Error(data.error || "生成失败，请稍后重试");
          }
          showResult(data.shortUrl, data.code);
          urlInput.value = "";
          aliasInput.value = "";
          previewEl.textContent = "";
          previewEl.classList.remove("active");
        } catch (err) {
          showError(err.message || "发生未知错误");
        } finally {
          submitBtn.disabled = false;
          submitBtn.textContent = "生成短链接";
        }
      });
    </script>
  </body>
</html>
